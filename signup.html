<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="auth-page">

<div class="auth-container">
    <div class="auth-logo logo">Fitness AI</div>
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join us to get your personalized fitness plan.</p>

    <form id="signupForm" class="auth-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="E.g. john@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" required>
        </div>

        <button type="submit" class="submit-btn auth-btn">Sign Up</button>
    </form>

    <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="signup.js"></script>

</body>

</html>
