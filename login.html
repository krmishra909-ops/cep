<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Fitness AI</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="auth-page">

<div class="auth-container">
    <div class="auth-logo logo">Fitness AI</div>
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Login to access your custom fitness plan.</p>

    <form id="loginForm" class="auth-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="E.g. john@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="submit-btn auth-btn">Login</button>
    </form>

    <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<script src="login.js"></script>

</body>

</html>
